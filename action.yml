name: 'Judge Action'

inputs:
  image:
    description: 'Student Docker image name'
    required: true
  judge_image:
    description: 'Judge Docker image'
    required: false
    default: 'knoker123/my-judge:v1'


runs:
  using: 'composite'
  steps:
    - name: Run judge
      shell: bash
      run: |
        chmod +x ${{ github.action_path }}/run.sh
        ${{ github.action_path }}/run.sh
      env:
        IMAGE_SOLUTION: ${{ inputs.image }}
        IMAGE_JUDGE: ${{ inputs.judge_image }}

    - name: Show logs on failure
      if: failure()
      shell: bash
      run: |
        echo "===== all containers ====="
        docker ps -a || true
        echo "===== student-app logs ====="
        docker logs tmp-student-app-1 2>&1 || true
        echo "===== student-app inspect ====="
        docker inspect tmp-student-app-1 2>&1 || true
        echo "===== redis logs ====="
        docker logs tmp-redis-1 2>&1 || true
        echo "===== db logs ====="
        docker logs tmp-db-1 2>&1 || true